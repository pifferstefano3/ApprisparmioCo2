<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2e8b57">
  <title>VERDENT — Classifica Globale</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/components.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="animated-bg"></div>
  <div class="particles-container">
    <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
    <div class="co2-particle"></div><div class="co2-particle"></div>
  </div>

  <div class="page pb-nav">

    <!-- Header -->
    <div class="page-header">
      <div style="font-size:1.5rem;">🏆</div>
      <div class="header-user"><div class="header-username">Classifica Globale</div></div>
      <div class="header-points"><span>🌍</span><span id="myRankBadge">-</span></div>
    </div>

    <div class="container" style="padding-top:16px;">

      <!-- La tua posizione -->
      <div class="glass-card animate-fade-in-up" style="margin-bottom:16px; text-align:center;">
        <div style="font-size:0.72rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); font-weight:600;">La tua posizione</div>
        <div style="font-size:2.5rem; font-weight:800; color:white; margin:4px 0;" id="myRankDisplay">#-</div>
        <div style="font-size:0.8rem; color:#4ade80;" id="myRankCO2">... punti CO2</div>
        <div style="font-size:0.72rem; color:var(--text-muted); margin-top:4px;">Punti CO2 = non spendibili · basati sui km ecologici</div>
      </div>

      <!-- Grafico Top 10 -->
      <div class="glass-card animate-fade-in-up" style="margin-bottom:16px; animation-delay:0.1s;">
        <h3 style="color:white; font-size:0.9rem; margin-bottom:14px;">📊 Top 10 — Punti CO2</h3>
        <div style="position:relative; height:220px;">
          <canvas id="leaderboardChart"></canvas>
        </div>
      </div>

      <!-- Lista classifica completa -->
      <div class="glass-card animate-fade-in-up" style="animation-delay:0.2s;">
        <h3 style="color:white; font-size:0.9rem; margin-bottom:14px;">🥇 Classifica Completa</h3>
        <div id="rankingList">
          <div class="spinner" style="margin:20px auto;"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="/dashboard.html"   class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a href="/leaderboard.html" class="nav-item active"><span class="nav-icon">🏆</span><span>Classifica</span></a>
    <a href="/challenges.html"  class="nav-item"><span class="nav-icon">🎯</span><span>Sfide</span></a>
    <a href="/chat.html"        class="nav-item"><span class="nav-icon">🤖</span><span>EcoChat</span></a>
    <a href="/shop.html"        class="nav-item"><span class="nav-icon">🛍️</span><span>Shop</span></a>
  </nav>

  <div class="toast" id="toast"></div>

  <style>
    .rank-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.1); }
    .rank-item:last-child { border-bottom:none; }
    .rank-num { font-size:1rem; font-weight:800; color:white; min-width:32px; text-align:center; }
    .rank-num.gold   { color:#fbbf24; font-size:1.2rem; }
    .rank-num.silver { color:#9ca3af; }
    .rank-num.bronze { color:#d97706; }
    .rank-avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#2e8b57,#4ade80); display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; overflow:hidden; }
    .rank-avatar img { width:100%; height:100%; object-fit:cover; }
    .rank-info { flex:1; }
    .rank-username { font-weight:600; color:white; font-size:0.88rem; }
    .rank-title    { font-size:0.68rem; color:#4ade80; }
    .rank-co2      { font-weight:700; color:#4ade80; font-size:0.85rem; white-space:nowrap; }
    .rank-item.me  { background:rgba(46,139,87,0.15); border-radius:10px; padding:12px; margin:4px -4px; }
  </style>

  <script src="/js/api.js"></script>
  <script src="/js/leaderboard.js"></script>
</body>
</html>
