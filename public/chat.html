<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VERDENT - EcoChat AI</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="animated-bg"></div>
  <div class="particles-container">
    <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
    <div class="leaf"></div><div class="leaf"></div>
    <div class="co2-particle"></div><div class="co2-particle"></div><div class="co2-particle"></div>
  </div>

  <div class="page" style="display:flex; flex-direction:column; height:100vh;">

    <!-- Header fisso -->
    <div style="padding:16px 16px 0; flex-shrink:0;">
      <div class="glass-card" style="display:flex; align-items:center; gap:12px; padding:12px 16px;">
        <div style="font-size:1.8rem;">?</div>
        <div style="flex:1;">
          <div style="font-weight:700; color:white; font-size:0.95rem;">EcoChat AI</div>
          <div style="font-size:0.72rem; color:#4ade80;">? Online  Assistente ecologico</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:0.7rem; color:var(--text-muted);">Le tue stelle</div>
          <div style="font-weight:700; color:#fbbf24; font-size:0.95rem;">? <span id="chatStars">0</span></div>
        </div>
      </div>
      <!-- Avviso -->
      <div style="margin-top:8px; background:rgba(251,191,36,0.12); border:1px solid rgba(251,191,36,0.3); border-radius:10px; padding:8px 12px; font-size:0.72rem; color:#fbbf24; display:flex; gap:6px; align-items:flex-start;">
        <span>?</span>
        <span>Domande ecologiche guadagnano 510 stelle. Linguaggio non consentito = <strong>-50 stelle</strong>.</span>
      </div>
    </div>

    <!-- Chat Container -->
    <div style="flex:1; display:flex; flex-direction:column; padding:0 16px;">
      <div id="chatMessages" style="flex:1; overflow-y:auto; padding:16px; background:rgba(255,255,255,0.05); border-radius:12px; margin-bottom:16px;">
        <div style="text-align:center; padding:40px 0; color:var(--text-muted);">
          <div class="spinner" style="margin:0 auto 12px;"></div>
          Caricamento chat...
        </div>
      </div>

      <!-- Input Area -->
      <div class="glass-card" style="padding:12px; margin-bottom:16px;">
        <div style="display:flex; gap:8px;">
          <input type="text" id="aiInput" class="form-input" placeholder="Chiedimi qualsiasi cosa su ecologia, sostenibilità, trasporti..." style="flex:1;">
          <button id="sendAiBtn" class="btn btn-primary" style="width:auto; padding:8px 16px;">Invia</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="/dashboard.html" class="nav-item"><span class="nav-icon">Home</span></a>
    <a href="/teams.html" class="nav-item"><span class="nav-icon">Team</span></a>
    <a href="/goals.html" class="nav-item"><span class="nav-icon">Obiettivi</span></a>
    <a href="/chat.html" class="nav-item active"><span class="nav-icon">Chat</span></a>
    <a href="/profile.html" class="nav-item"><span class="nav-icon">Profilo</span></a>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="/js/api.js"></script>
  <script src="/js/chat-ai.js"></script>
</body>
</html>
