<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VERDENT - Mappa</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
  <div class="animated-bg"></div>
  <div class="particles-container">
    <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
    <div class="leaf"></div><div class="leaf"></div>
    <div class="co2-particle"></div><div class="co2-particle"></div><div class="co2-particle"></div>
  </div>

  <div class="page pb-nav" style="height:100vh; display:flex; flex-direction:column;">
    <!-- Header -->
    <div class="page-header">
      <a href="/dashboard.html" class="btn btn-ghost btn-sm" style="width:auto; padding:8px 14px; color:white;">Home</a>
      <div class="header-user"><div class="header-username">Mappa</div></div>
      <button onclick="toggleTracking()" id="trackingBtn" class="btn btn-primary btn-sm" style="width:auto; padding:8px 16px;">Inizia Tracking</button>
    </div>

    <!-- Map Container -->
    <div style="flex:1; position:relative; margin:16px;">
      <div id="map" style="width:100%; height:100%; border-radius:12px; overflow:hidden;"></div>
      
      <!-- Map Controls -->
      <div style="position:absolute; top:16px; right:16px; z-index:1000; display:flex; flex-direction:column; gap:8px;">
        <button onclick="centerMap()" class="btn btn-secondary btn-sm" style="width:auto; padding:8px 12px;">Team</button>
        <button onclick="toggleLayers()" class="btn btn-secondary btn-sm" style="width:auto; padding:8px 12px;">Layer</button>
      </div>
      
      <!-- Live Stats -->
      <div id="liveStats" style="position:absolute; bottom:16px; left:16px; z-index:1000; display:none;">
        <div class="glass-card" style="padding:12px; min-width:200px;">
          <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
            <span style="color:white; font-size:0.8rem;">Distanza</span>
            <span style="color:#4ade80; font-weight:bold;" id="liveDistance">0.0 km</span>
          </div>
          <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
            <span style="color:white; font-size:0.8rem;">Durata</span>
            <span style="color:#4ade80; font-weight:bold;" id="liveDuration">00:00</span>
          </div>
          <div style="display:flex; justify-content:space-between;">
            <span style="color:white; font-size:0.8rem;">CO2 Risparmiata</span>
            <span style="color:#4ade80; font-weight:bold;" id="liveCO2">0.0 kg</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Transport Selection -->
    <div style="padding:0 16px 16px;">
      <div class="glass-card" style="padding:12px;">
        <div style="color:white; font-weight:600; margin-bottom:8px;">Mezzo di Trasporto</div>
        <div style="display:flex; gap:8px;">
          <button onclick="selectTransport('walk')" class="transport-btn active" data-transport="walk">Team</button>
          <button onclick="selectTransport('bike')" class="transport-btn" data-transport="bike">Team</button>
          <button onclick="selectTransport('bus')" class="transport-btn" data-transport="bus">Team</button>
          <button onclick="selectTransport('train')" class="transport-btn" data-transport="train">Team</button>
          <button onclick="selectTransport('car')" class="transport-btn" data-transport="car">Team</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="/dashboard.html" class="nav-item"><span class="nav-icon">Home</span></a>
    <a href="/teams.html" class="nav-item"><span class="nav-icon">Team</span></a>
    <a href="/goals.html" class="nav-item"><span class="nav-icon">Obiettivi</span></a>
    <a href="/chat.html" class="nav-item"><span class="nav-icon">Chat</span></a>
    <a href="/profile.html" class="nav-item"><span class="nav-icon">Profilo</span></a>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/map-fixed.js"></script>

  <style>
    .transport-btn {
      padding:8px 12px; border:1px solid rgba(255,255,255,0.3);
      background:rgba(255,255,255,0.1); color:white; border-radius:8px;
      cursor:pointer; transition:all 0.2s ease;
    }
    .transport-btn:hover { background:rgba(255,255,255,0.2); }
    .transport-btn.active {
      background:linear-gradient(135deg, #2ecc71, #27ae60);
      border-color:#2ecc71;
    }
  </style>
</body>
</html>
