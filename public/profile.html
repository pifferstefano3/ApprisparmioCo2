<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2e8b57">
  <title>VERDENT - Il mio Profilo</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="animated-bg"></div>
  <div class="particles-container">
    <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
    <div class="leaf"></div><div class="leaf"></div>
    <div class="co2-particle"></div><div class="co2-particle"></div><div class="co2-particle"></div>
  </div>

  <div class="page pb-nav">
    <!-- Header -->
    <div class="page-header">
      <a href="/dashboard.html" class="btn btn-ghost btn-sm" style="width:auto; padding:8px 14px; color:white;">Home</a>
      <div class="header-user" style="text-align:center;"><div class="header-username">Il mio Profilo</div></div>
      <div class="header-points"><span>?</span><span id="hPoints">0</span></div>
    </div>

    <div class="container" style="padding-top:20px;">

      <!-- Avatar + Cornice -->
      <div class="glass-card animate-fade-in-up" style="text-align:center; margin-bottom:16px;">
        <div style="position:relative; display:inline-block; margin-bottom:16px;">
          <!-- Cornice -->
          <div id="frameRing" style="position:absolute;inset:-6px;border-radius:50%;pointer-events:none;"></div>
          <!-- Foto profilo -->
          <div id="profilePicWrapper" style="width:100px;height:100px;border-radius:50%;overflow:hidden;background:linear-gradient(135deg,#2e8b57,#4ade80);display:flex;align-items:center;justify-content:center;font-size:2.8rem;border:3px solid rgba(255,255,255,0.4);cursor:pointer;" onclick="document.getElementById('avatarInput').click()">
            <span id="profileEmoji">?</span>
            <img id="profileImg" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;">
          </div>
          <div style="position:absolute;bottom:0;right:0;width:28px;height:28px;background:#2e8b57;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid white;font-size:0.8rem;" onclick="document.getElementById('avatarInput').click()">?</div>
        </div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none">

        <h2 style="color:white;" id="profileUsername">...</h2>
        <div id="profileHonorTitle" style="font-size:0.8rem; color:#4ade80; margin-top:4px;"></div>
        <div id="profileBio" style="color:var(--text-muted); font-size:0.85rem; margin-top:6px;"></div>
        <div id="emailVerifyBadge" style="display:none; margin-top:8px; font-size:0.75rem; color:#fbbf24;">
          ? Email non verificata  <button onclick="resendVerification()" style="background:none;border:none;color:#4ade80;cursor:pointer;font-size:0.75rem;font-weight:600;">Reinvia verifica</button>
        </div>

        <!-- Edit Profile Form -->
        <form id="profileForm" method="POST" action="/api/profile/update" enctype="multipart/form-data" style="margin-top:14px; display:flex; gap:8px; flex-direction:column;">
          <input type="text" name="name" id="nameInput" class="form-input" placeholder="Il tuo nome..." maxlength="50">
          <input type="text" name="bio" id="bioInput" class="form-input" placeholder="La tua bio ecologica (max 200 caratteri)..." maxlength="200">
          <input type="number" name="trophies" id="trophiesInput" class="form-input" placeholder="Trofei..." min="0">
          <input type="file" name="avatar" id="avatarInput" accept="image/*" style="display:none">
          <button type="submit" class="btn btn-primary btn-sm">Aggiorna Profilo</button>
        </form>
      </div>

      <!-- Statistiche -->
      <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px;">
        <div class="glass-card stat-card animate-fade-in-up" style="animation-delay:0.05s;">
          <div class="stat-icon">?</div>
          <div class="stat-value" id="pStars">0</div>
          <div class="stat-label">Stelle</div>
        </div>
        <div class="glass-card stat-card animate-fade-in-up" style="animation-delay:0.1s;">
          <div class="stat-icon">?</div>
          <div class="stat-value" id="pCO2">0</div>
          <div class="stat-label">kg CO2</div>
        </div>
        <div class="glass-card stat-card animate-fade-in-up" style="animation-delay:0.15s;">
          <div class="stat-icon">?</div>
          <div class="stat-value" id="pPosts">0</div>
          <div class="stat-label">Post Feed</div>
        </div>
      </div>

      <!-- Badge / Cornice attiva -->
      <div class="glass-card animate-fade-in-up" style="animation-delay:0.2s; margin-bottom:16px;">
        <h3 style="color:white; font-size:0.9rem; margin-bottom:12px;">Badge e Ricompense</h3>
        <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px;">
          <div class="badge-item" style="text-align:center;">
            <div style="font-size:1.5rem; margin-bottom:4px;">?</div>
            <div style="font-size:0.7rem; color:var(--text-muted);">Primi Passi</div>
          </div>
          <div class="badge-item" style="text-align:center;">
            <div style="font-size:1.5rem; margin-bottom:4px;">?</div>
            <div style="font-size:0.7rem; color:var(--text-muted);">Eco Warrior</div>
          </div>
          <div class="badge-item" style="text-align:center;">
            <div style="font-size:1.5rem; margin-bottom:4px;">?</div>
            <div style="font-size:0.7rem; color:var(--text-muted);">Team Player</div>
          </div>
          <div class="badge-item" style="text-align:center;">
            <div style="font-size:1.5rem; margin-bottom:4px;">?</div>
            <div style="font-size:0.7rem; color:var(--text-muted);">Sostenitore</div>
          </div>
        </div>
      </div>

      <!-- Attività Recenti -->
      <div class="glass-card animate-fade-in-up" style="animation-delay:0.25s;">
        <h3 style="color:white; font-size:0.9rem; margin-bottom:12px;">Attività Recenti</h3>
        <div id="recentActivities" style="display:flex; flex-direction:column; gap:8px;">
          <div style="text-align:center; padding:20px 0; color:var(--text-muted);">
            <div class="spinner" style="margin:0 auto 8px;"></div>
            Caricamento attività...
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="/dashboard.html" class="nav-item"><span class="nav-icon">Home</span></a>
    <a href="/teams.html" class="nav-item"><span class="nav-icon">Team</span></a>
    <a href="/goals.html" class="nav-item"><span class="nav-icon">Obiettivi</span></a>
    <a href="/chat.html" class="nav-item"><span class="nav-icon">Chat</span></a>
    <a href="/profile.html" class="nav-item active"><span class="nav-icon">Profilo</span></a>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="/js/api.js"></script>
  <script src="/js/profile-handler.js"></script>
</body>
</html>
