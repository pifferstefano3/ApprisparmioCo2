<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2e8b57">
  <title>VERDENT — EcoShop</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>

  <div class="animated-bg"></div>
  <div class="particles-container">
    <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
    <div class="leaf"></div><div class="leaf"></div>
    <div class="co2-particle"></div><div class="co2-particle"></div>
    <div class="co2-particle"></div><div class="co2-particle"></div>
  </div>

  <div class="page pb-nav">

    <!-- Header -->
    <div class="page-header">
      <div style="font-size:1.5rem;">🛍️</div>
      <div class="header-user">
        <div class="header-greeting">Spendi i tuoi punti</div>
        <div class="header-username">EcoShop</div>
      </div>
      <div class="header-points">
        <span>⭐</span>
        <span id="shopPoints">0</span>
      </div>
    </div>

    <div class="container" style="padding-top:20px;">

      <!-- Filtri per tipo -->
      <div style="display:flex; gap:8px; margin-bottom:16px; overflow-x:auto; padding-bottom:4px;">
        <button class="filter-btn active" data-filter="all" style="white-space:nowrap; padding:8px 16px; border-radius:999px; background:rgba(46,139,87,0.4); border:1px solid rgba(74,222,128,0.4); color:white; font-size:0.8rem; font-weight:600; cursor:pointer; flex-shrink:0; transition:all 0.2s;">Tutti</button>
        <button class="filter-btn" data-filter="skin" style="white-space:nowrap; padding:8px 16px; border-radius:999px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.7); font-size:0.8rem; font-weight:600; cursor:pointer; flex-shrink:0; transition:all 0.2s;">🎨 Skin</button>
        <button class="filter-btn" data-filter="title" style="white-space:nowrap; padding:8px 16px; border-radius:999px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.7); font-size:0.8rem; font-weight:600; cursor:pointer; flex-shrink:0; transition:all 0.2s;">🏷️ Titoli</button>
        <button class="filter-btn" data-filter="trophy" style="white-space:nowrap; padding:8px 16px; border-radius:999px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.7); font-size:0.8rem; font-weight:600; cursor:pointer; flex-shrink:0; transition:all 0.2s;">🏆 Trofei</button>
      </div>

      <!-- Shop Grid -->
      <div class="shop-grid" id="shopGrid">
        <div style="grid-column:span 2; text-align:center; padding:40px 0; color:var(--text-muted);">
          <div class="spinner" style="margin:0 auto 12px;"></div>
          Caricamento catalogo...
        </div>
      </div>

    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="/dashboard.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </a>
    <a href="/map.html" class="nav-item">
      <span class="nav-icon">🗺️</span>
      <span>Mappa</span>
    </a>
    <a href="/shop.html" class="nav-item active">
      <span class="nav-icon">🛍️</span>
      <span>EcoShop</span>
    </a>
  </nav>

  <!-- Modal Conferma Acquisto -->
  <div id="confirmModal" style="display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; padding:16px;">
    <div class="glass-card" style="max-width:340px; width:100%; text-align:center; animation:fadeInUp 0.3s ease both;">
      <div style="font-size:2.5rem; margin-bottom:12px;" id="modalEmoji">🎁</div>
      <h3 style="color:white; margin-bottom:6px;" id="modalName">Nome Item</h3>
      <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:16px;" id="modalDesc">Descrizione item</p>
      <div style="display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:20px; font-size:1.1rem; font-weight:700; color:#fbbf24;">
        ⭐ <span id="modalCost">0</span> punti
      </div>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-secondary" onclick="closeModal()" style="font-size:0.85rem;">Annulla</button>
        <button class="btn btn-primary" id="confirmBuyBtn" style="font-size:0.85rem;">Sblocca! 🎉</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/js/api.js"></script>
  <script src="/js/shop.js"></script>
</body>
</html>
